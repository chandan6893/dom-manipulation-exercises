<!-- horizontal multiple-item slider with left/right arrows -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi Item Slider</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        margin: 0;
        padding: 40px;
        background: #f2f2f2;
        font-family: Arial;
      }

      .slider-container {
        position: relative;
        width: 100%;
        overflow: hidden;
      }

      .slider {
        display: flex;
        gap: 15px;
        overflow-x: auto;
        scroll-behavior: smooth;
        scrollbar-width: none;
      }
      .slider {
        padding: 0 40px;
      }

      .slider::-webkit-scrollbar {
        display: none;
      }

      .item {
        min-width: 180px;
        flex: 0 0 auto;
        border-radius: 8px;
        overflow: hidden;
        background: white;
      }

      .item img {
        width: 100%;
        display: block;
      }

      .nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: white;
        border: none;
        font-size: 24px;
        padding: 10px 14px;
        cursor: pointer;
        border-radius: 50%;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }

      .left {
        left: 0;
      }

      .right {
        right: 0;
      }
    </style>
  </head>
  <body>
    <div class="slider-container">
      <button class="nav left">&#10094;</button>

      <div class="slider">
        <div class="item"><img src="https://picsum.photos/200/200?1" /></div>
        <div class="item"><img src="https://picsum.photos/200/200?2" /></div>
        <div class="item"><img src="https://picsum.photos/200/200?3" /></div>
        <div class="item"><img src="https://picsum.photos/200/200?4" /></div>
        <div class="item"><img src="https://picsum.photos/200/200?5" /></div>
        <div class="item"><img src="https://picsum.photos/200/200?6" /></div>
        <div class="item"><img src="https://picsum.photos/200/200?7" /></div>
        <div class="item"><img src="https://picsum.photos/200/200?8" /></div>
        <div class="item"><img src="https://picsum.photos/200/200?4" /></div>
        <div class="item"><img src="https://picsum.photos/200/200?5" /></div>
        <div class="item"><img src="https://picsum.photos/200/200?6" /></div>
        <div class="item"><img src="https://picsum.photos/200/200?7" /></div>
        <div class="item"><img src="https://picsum.photos/200/200?8" /></div>
      </div>

      <button class="nav right">&#10095;</button>
    </div>

    <script>
      const slider = document.querySelector(".slider");
      const leftBtn = document.querySelector(".left");
      const rightBtn = document.querySelector(".right");

      const scrollAmount = 400; // how much to move each click

      rightBtn.addEventListener("click", () => {
        slider.scrollLeft += scrollAmount;
      });

      leftBtn.addEventListener("click", () => {
        slider.scrollLeft -= scrollAmount;
      });
    </script>

  </body>
</html>
