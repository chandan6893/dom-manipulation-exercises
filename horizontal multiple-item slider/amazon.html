<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        font-family: Arial;
        padding: 40px;
        background: #f2f2f2;
      }

      .slider-wrapper {
        position: relative;
      }

      .slider {
        display: flex;
        gap: 15px;
        overflow: hidden;
        cursor: grab;
        scroll-behavior: smooth;
      }

      .slider.active {
        cursor: grabbing;
      }

      .item {
        min-width: 200px;
        background: white;
        border-radius: 8px;
        overflow: hidden;
      }

      .item img {
        width: 100%;
        display: block;
      }

      .nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: white;
        border: none;
        font-size: 24px;
        padding: 10px 14px;
        cursor: pointer;
        border-radius: 50%;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }

      .left {
        left: -15px;
      }

      .right {
        right: -15px;
      }
    </style>
  </head>
  <body>
    <div class="slider-wrapper">
      <button class="nav left">&#10094;</button>

      <div class="slider">
        <div class="item"><img src="https://picsum.photos/200?1" /></div>
        <div class="item"><img src="https://picsum.photos/200?2" /></div>
        <div class="item"><img src="https://picsum.photos/200?3" /></div>
        <div class="item"><img src="https://picsum.photos/200?4" /></div>
        <div class="item"><img src="https://picsum.photos/200?5" /></div>
        <div class="item"><img src="https://picsum.photos/200?6" /></div>
        <div class="item"><img src="https://picsum.photos/200?7" /></div>
        <div class="item"><img src="https://picsum.photos/200?8" /></div>

        <div class="item"><img src="https://picsum.photos/200?1" /></div>
        <div class="item"><img src="https://picsum.photos/200?2" /></div>
        <div class="item"><img src="https://picsum.photos/200?3" /></div>
        <div class="item"><img src="https://picsum.photos/200?4" /></div>
        <div class="item"><img src="https://picsum.photos/200?5" /></div>
        <div class="item"><img src="https://picsum.photos/200?6" /></div>
        <div class="item"><img src="https://picsum.photos/200?7" /></div>
        <div class="item"><img src="https://picsum.photos/200?8" /></div>

         <div class="item"><img src="https://picsum.photos/200?1" /></div>
        <div class="item"><img src="https://picsum.photos/200?2" /></div>
        <div class="item"><img src="https://picsum.photos/200?3" /></div>
        <div class="item"><img src="https://picsum.photos/200?4" /></div>
        <div class="item"><img src="https://picsum.photos/200?5" /></div>
        <div class="item"><img src="https://picsum.photos/200?6" /></div>
        <div class="item"><img src="https://picsum.photos/200?7" /></div>
        <div class="item"><img src="https://picsum.photos/200?8" /></div>
      </div>

      <button class="nav right">&#10095;</button>
    </div>
    <script>
      const slider = document.querySelector(".slider");
      const leftBtn = document.querySelector(".left");
      const rightBtn = document.querySelector(".right");

      const itemWidth = document.querySelector(".item").offsetWidth + 15;

      rightBtn.addEventListener("click", () => {
        slider.scrollLeft += itemWidth * 2;
      });

      leftBtn.addEventListener("click", () => {
        slider.scrollLeft -= itemWidth * 2;
      });

      /* DRAG SCROLL */

      let isDragging = false;
      let startX;
      let scrollLeft;

      slider.addEventListener("mousedown", (e) => {
        isDragging = true;
        slider.classList.add("active");

        startX = e.pageX - slider.offsetLeft;
        scrollLeft = slider.scrollLeft;
      });

      slider.addEventListener("mouseleave", () => {
        isDragging = false;
        slider.classList.remove("active");
      });

      slider.addEventListener("mouseup", () => {
        isDragging = false;
        slider.classList.remove("active");
      });

      slider.addEventListener("mousemove", (e) => {
        if (!isDragging) return;

        e.preventDefault();

        const x = e.pageX - slider.offsetLeft;
        const walk = (x - startX) * 2;

        slider.scrollLeft = scrollLeft - walk;
      });
    </script>
  </body>
</html>
